<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fathom Stories</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f1419'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%234ade80'/%3E%3Ccircle cx='32' cy='32' r='6' fill='%230f1419'/%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f1419'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%234ade80'/%3E%3Ccircle cx='32' cy='32' r='6' fill='%230f1419'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/css/base.css?v=4" />
  <link rel="stylesheet" href="/static/css/layout.css?v=4" />
  <link rel="stylesheet" href="/static/css/header.css?v=4" />
  <link rel="stylesheet" href="/static/css/timeline.css?v=4" />
  <link rel="stylesheet" href="/static/css/reader.css?v=4" />
  <link rel="stylesheet" href="/static/css/responsive.css?v=4" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="logo">●</span>
      <span class="title">Fathom Stories</span>
    </div>
    <div class="header-status" id="header-status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">loading…</span>
    </div>
    <div class="header-countdowns" id="header-countdowns">
      <span class="countdown-chip" id="chip-refresh" title="Next automatic RSS refresh">
        <span class="chip-label">refresh</span>
        <span class="chip-time" id="chip-refresh-time">--:--</span>
      </span>
      <span class="countdown-chip" id="chip-regroup" title="Next automatic regroup">
        <span class="chip-label">regroup</span>
        <span class="chip-time" id="chip-regroup-time">--:--</span>
      </span>
    </div>
    <div class="header-actions">
      <button id="btn-theme" class="btn-secondary btn-icon" title="Toggle light/dark">◐</button>
      <a href="http://localhost:8001" target="_blank" class="btn-secondary" title="Open admin (separate port)">admin</a>
    </div>
  </header>

  <nav class="event-tabs" id="event-tabs">
    <div class="tabs-empty" id="tabs-empty">No events yet — fetch and group some articles.</div>
  </nav>

  <main class="app-main">
    <section class="event-pane" id="event-pane">
      <div class="pane-empty" id="pane-empty">Select an event tab to view its timeline.</div>
    </section>

    <aside class="reader-pane" id="reader-pane" hidden>
      <div class="reader-header">
        <button id="btn-close-reader" class="btn-icon" title="Close">×</button>
        <div class="reader-source" id="reader-source"></div>
      </div>
      <div class="reader-body" id="reader-body"></div>
      <div class="reader-footer" id="reader-footer">
        <a id="reader-original" href="#" target="_blank" rel="noopener" class="btn-link">Open original ↗</a>
        <button id="btn-toggle-read" class="btn-secondary">Mark unread</button>
        <button id="btn-remove-from-event" class="btn-secondary" hidden>Remove from event</button>
      </div>
      <div class="reader-event-picker" id="reader-event-picker" hidden>
        <label for="reader-event-select">Move to event:</label>
        <select id="reader-event-select"></select>
        <button id="btn-confirm-move" class="btn-secondary">Move</button>
        <span id="reader-move-status" class="move-status"></span>
      </div>
    </aside>
  </main>

  <div class="toast-container" id="toasts"></div>

  <script type="module" src="/static/script.js?v=9"></script>
</body>
</html>
