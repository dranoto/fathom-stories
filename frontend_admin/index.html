<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fathom-stories · admin</title>
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body>
  <header class="admin-header">
    <div class="brand">
      <span class="logo">●</span>
      <span class="title">fathom-stories · admin</span>
      <span class="port">port 8001</span>
    </div>
    <div class="actions">
      <button id="btn-run-grouping" class="btn-primary">Run live grouping</button>
      <button id="btn-run-recluster" class="btn-primary">Run recluster</button>
      <button id="btn-run-lifecycle" class="btn-secondary">Run lifecycle</button>
      <button id="btn-theme" class="btn-secondary btn-icon" title="Toggle light/dark">◐</button>
      <a href="http://localhost:8000" target="_blank" class="btn-link">reader ↗</a>
    </div>
  </header>

  <div class="admin-stats" id="admin-stats"></div>

  <nav class="admin-tabs">
    <button class="atab active" data-tab="events">Events</button>
    <button class="atab" data-tab="ungrouped">Ungrouped articles</button>
    <button class="atab" data-tab="proposals">Recluster proposals <span class="badge" id="proposal-count">0</span></button>
    <button class="atab" data-tab="feedback">Feedback history</button>
  </nav>

  <main class="admin-main" id="admin-main"></main>

  <div class="toast-container" id="toasts"></div>

  <script type="module" src="/static/script.js?v=2"></script>
</body>
</html>
